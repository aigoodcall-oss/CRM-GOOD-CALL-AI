<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GC — Panel de Control</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📞</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════
     TOPBAR
     ═══════════════════════════════════════════════════════════════════════ -->
<header class="topbar">
  <a class="top-logo" onclick="App.navigateTo('resumen')">
    <div class="logo-mark">GC</div>
    <span class="logo-label">Good Call AI</span>
  </a>

  <nav class="top-nav">
    <div class="top-nav-item active" data-nav="resumen" onclick="App.navigateTo('resumen')">Dashboard</div>
    <div class="top-nav-item" data-nav="mis-bots" onclick="App.navigateTo('mis-bots')">Bots</div>
    <div class="top-nav-item" data-nav="conversaciones" onclick="App.navigateTo('conversaciones')">Conversaciones</div>
    <div class="top-nav-item" data-nav="analiticas" onclick="App.navigateTo('analiticas')">Analíticas</div>
    <div class="top-nav-item" data-nav="citas" onclick="App.navigateTo('citas')">Citas</div>
  </nav>

  <div class="top-right">
    <button class="refresh-btn" id="globalRefresh" onclick="App.refreshData()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 8a7 7 0 0113-3.5M15 8a7 7 0 01-13 3.5"/><polyline points="1,3 1,8 6,8"/><polyline points="15,13 15,8 10,8"/></svg>
      Actualizar
    </button>
    <div class="divider-v"></div>
    <div class="user-chip">
      <div class="user-av" id="userInitials">GC</div>
      <span class="user-chip-name" id="userName">Admin</span>
    </div>
    <button class="logout-btn" onclick="App.handleLogout()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M11 11l3-3-3-3M14 8H6"/></svg>
      Salir
    </button>
  </div>
</header>

<div class="layout">

  <!-- ═══════════════════════════════════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sg">
      <div class="sg-label">General</div>
      <div class="si active" data-page="resumen" onclick="App.navigateTo('resumen')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1.2"/><rect x="9" y="1.5" width="5.5" height="5.5" rx="1.2"/><rect x="1.5" y="9" width="5.5" height="5.5" rx="1.2"/><rect x="9" y="9" width="5.5" height="5.5" rx="1.2"/></svg>
        Resumen
      </div>
      <div class="si" data-page="mis-bots" onclick="App.navigateTo('mis-bots')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><circle cx="8" cy="8" r="2.2"/></svg>
        Mis Bots
        <span class="si-badge">1</span>
      </div>
      <div class="si" data-page="conversaciones" onclick="App.navigateTo('conversaciones')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h12a1 1 0 011 1v7a1 1 0 01-1 1H5l-3 2V4a1 1 0 011-1z"/></svg>
        Conversaciones
      </div>
      <div class="si" data-page="citas" onclick="App.navigateTo('citas')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="1.5"/><line x1="2" y1="7" x2="14" y2="7"/><line x1="5" y1="1.5" x2="5" y2="4.5"/><line x1="11" y1="1.5" x2="11" y2="4.5"/></svg>
        Citas
      </div>
      <div class="si" data-page="analiticas" onclick="App.navigateTo('analiticas')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,11 4.5,7 7.5,9.5 11.5,4 15,6"/></svg>
        Analíticas
      </div>
    </div>

    <div class="sg">
      <div class="sg-label">Configuración</div>
      <div class="si" data-page="configurar-bot" onclick="App.navigateTo('configurar-bot')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.22 3.22l1.42 1.42M11.36 11.36l1.42 1.42M3.22 12.78l1.42-1.42M11.36 4.64l1.42-1.42"/></svg>
        Configurar Bot
      </div>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════════════════════════════════ -->
  <main class="main" id="main-content">
    <div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3)">
      Cargando datos...
    </div>
  </main>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     SCRIPTS (order matters: dependencies first)
     ═══════════════════════════════════════════════════════════════════════ -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/charts.js"></script>
<script src="js/pages.js"></script>
<script src="js/app.js"></script>

<script>
  // Boot the application
  App.init();
</script>

</body>
</html>
